<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique Futuriste</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0f3d, #ff66cc);
      color: #fff;
    }
    header {
      text-align: center;
      padding: 2rem;
      background: rgba(0,0,0,0.4);
    }
    header h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    .product {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1rem;
      width: 250px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
      transition: transform 0.3s ease;
    }
    .product:hover {
      transform: scale(1.05);
    }
    .product img {
      width: 100%;
      border-radius: 8px;
    }
    .product h2 {
      margin: 1rem 0 0.5rem;
      font-size: 1.2rem;
    }
    .product p {
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .btn {
      background: linear-gradient(90deg, #00ccff, #ff66cc);
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: linear-gradient(90deg, #ff66cc, #00ccff);
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: rgba(0,0,0,0.4);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Boutique Futuriste</h1>
    <p>Commandez vos produits dans un univers bleu-rose</p>
  </header>

  <section class="products">
    <div class="product">
      <img src="produit1.jpg" alt="Produit 1">
      <h2>Produit 1</h2>
      <p>Description rapide du produit 1.</p>
      <button class="btn">Commander</button>
    </div>

    <div class="product">
      <img src="produit2.jpg" alt="Produit 2">
      <h2>Produit 2</h2>
      <p>Description rapide du produit 2.</p>
      <button class="btn">Commander</button>
    </div>

    <div class="product">
      <img src="produit3.jpg" alt="Produit 3">
      <h2>Produit 3</h2>
      <p>Description rapide du produit 3.</p>
      <button class="btn">Commander</button>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Boutique Futuriste. Tous droits réservés.</p>
  </footer>
</body>
</html>
