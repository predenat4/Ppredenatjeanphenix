<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phenix Entreprise</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0000ff, #ff0000);
      color: #fff;
      overflow-x: hidden;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 15px rgba(255,0,0,0.6);
    }
    header h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #00f; }
      to { text-shadow: 0 0 20px #f00; }
    }
    .cart-btn, .btn {
      background: linear-gradient(90deg, #00ccff, #ff66cc);
      border: none;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .cart-btn:hover, .btn:hover {
      transform: scale(1.1);
      background: linear-gradient(90deg, #ff66cc, #00ccff);
    }
    .products {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      padding: 2rem;
    }
    .product {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1rem;
      width: 250px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
      transition: transform 0.3s ease;
    }
    .product:hover {
      transform: scale(1.05);
    }
    .product img {
      width: 100%;
      border-radius: 8px;
    }
    #cart {
      display: none;
      background: rgba(0,0,0,0.8);
      padding: 1rem;
      margin: 1rem;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,255,0.6);
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: rgba(0,0,0,0.5);
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Phenix Entreprise</h1>
    <button class="cart-btn" id="cart-btn">🛒 Panier (0)</button>
  </header>

  <!-- Liste des produits -->
  <section class="products">
    <div class="product">
      <img src="produit1.jpg" alt="Produit 1">
      <h2>Produit 1</h2>
      <p>Prix: 10 €</p>
      <button class="btn" onclick="addToCart(1)">Commander</button>
    </div>

    <div class="product">
      <img src="produit2.jpg" alt="Produit 2">
      <h2>Produit 2</h2>
      <p>Prix: 15 €</p>
      <button class="btn" onclick="addToCart(2)">Commander</button>
    </div>

    <div class="product">
      <img src="produit3.jpg" alt="Produit 3">
      <h2>Produit 3</h2>
      <p>Prix: 20 €</p>
      <button class="btn" onclick="addToCart(3)">Commander</button>
    </div>
  </section>

  <!-- Panier -->
  <section id="cart">
    <h2>Votre panier</h2>
    <ul id="cart-items"></ul>
    <p id="total">Total: 0 €</p>
  </section>

  <footer>
    <p>&copy; 2026 Phenix Entreprise. Tous droits réservés.</p>
  </footer>

  <script>
    const produits = {
      1: { name: "Produit 1", price: 10 },
      2: { name: "Produit 2", price: 15 },
      3: { name: "Produit 3", price: 20 }
    };

    const cartBtn = document.getElementById('cart-btn');
    const cartSection = document.getElementById('cart');
    const cartItemsList = document.getElementById('cart-items');
    const totalDisplay = document.getElementById('total');
    let cart = [];

    cartBtn.addEventListener('click', () => {
      cartSection.style.display = cartSection.style.display === 'none' ? 'block' : 'none';
    });

    function addToCart(id) {
      cart.push(produits[id]);
      updateCart();
    }

    function updateCart() {
      cartBtn.textContent = `🛒 Panier (${cart.length})`;
      cartItemsList.innerHTML = '';
      let total = 0;

      cart.forEach((item, index) => {
        total += item.price;
        const li = document.createElement('li');
        li.textContent = `${item.name} - ${item.price} €`;

        const removeBtn = document.createElement('button');
        removeBtn.textContent = "❌ Retirer";
        removeBtn.style.marginLeft = "10px";
        removeBtn.addEventListener('click', () => {
          cart.splice(index, 1);
          updateCart();
        });

        li.appendChild(removeBtn);
        cartItemsList.appendChild(li);
      });

      totalDisplay.textContent = `Total: ${total} €`;
    }
  </script>
</body>
</html>
